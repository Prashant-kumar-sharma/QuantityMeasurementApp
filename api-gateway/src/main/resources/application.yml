server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      x-forwarded:
        enabled: true

      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origin-patterns:
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowed-headers: "*"
            allow-credentials: true
        add-to-simple-url-handler-mapping: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # =========================
        # AUTH SERVICE
        # =========================
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: user-profile-route
          uri: lb://auth-service
          predicates:
            - Path=/api/user/me

        # =========================
        # MEASUREMENT SERVICE
        # =========================
        - id: measurement-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/user/quantities/**

        - id: convert-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/convert/**
          filters:
            - RewritePath=/api/convert/(?<segment>.*), /api/user/quantities/convert/${segment}

        - id: history-alias-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/user/history/**
          filters:
            - RewritePath=/api/user/history/(?<segment>.*), /api/user/quantities/history/${segment}

        # =========================
        # USER SERVICE
        # =========================
        - id: user-history-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        # =========================
        # 🔥 SWAGGER DOC ROUTES (FIXED)
        # =========================
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service/**, /v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service(?<segment>.*), /v3/api-docs${segment}

        - id: measurement-service-docs
          uri: lb://measurement-service
          predicates:
            - Path=/v3/api-docs/measurement-service/**, /v3/api-docs/measurement-service
          filters:
            - RewritePath=/v3/api-docs/measurement-service(?<segment>.*), /v3/api-docs${segment}

        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/v3/api-docs/user-service/**, /v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service(?<segment>.*), /v3/api-docs${segment}

        # =========================
        # OAUTH
        # =========================
        - id: oauth2-route
          uri: lb://auth-service
          predicates:
            - Path=/oauth2/**,/login/oauth2/**

    loadbalancer:
      retry:
        enabled: true

# =========================
# EUREKA
# =========================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: true

  instance:
    prefer-ip-address: true

# =========================
# ACTUATOR
# =========================
management:
  endpoints:
    web:
      exposure:
        include: "*"

# =========================
# 🔥 SWAGGER CONFIG (FIXED)
# =========================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: Measurement Service
        url: /v3/api-docs/measurement-service
      - name: User Service
        url: /v3/api-docs/user-service
  api-docs:
    path: /v3/api-docs

# =========================
# LOGGING
# =========================
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.quantitymeasurement.api_gateway: DEBUG